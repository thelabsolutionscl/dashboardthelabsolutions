name: Deploy Lead Worker

# Despliega automáticamente el lead-worker (Cloudflare Worker) cuando cambia su
# código en main, para que producción no quede nunca desincronizada del repo.
# También se puede lanzar a mano desde la pestaña Actions ("Run workflow").
#
# Requisito de una sola vez: crear el secreto CLOUDFLARE_API_TOKEN en
#   Settings → Secrets and variables → Actions
# con un API Token de Cloudflare que tenga permiso "Edit Cloudflare Workers".
# Mientras no exista el secreto, este workflow no falla: solo avisa y se omite.

on:
  push:
    branches: [main]
    paths:
      - 'lead-worker/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-lead-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Comprobar token de Cloudflare
        id: check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN no configurado — se omite el deploy del worker. Añádelo en Settings → Secrets para activar el auto-deploy."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Desplegar Worker
        if: steps.check.outputs.has_token == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: lead-worker
