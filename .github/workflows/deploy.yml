name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch: {} # permite lanzar el deploy a mano desde la pestaña Actions
  # Nota: tras crear/cambiar un secret (PROXY_URL, PROXY_KEY, ADS_WEBAPP…), hay que
  # relanzar este deploy para re-hornear los valores nuevos en index.html.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE }}       # el secret se llama AIRTABLE
          OPENAI_KEY: ${{ secrets.OPENAI }}             # el secret se llama OPENAI
          GOOGLE_CLIENT_ID: ${{ secrets.DRIVE }}        # el secret se llama DRIVE
          SII_WORKER_URL: ${{ secrets.SII_WORKER_URL }}
          SII_RUT_EMISOR: ${{ secrets.SII_RUT_EMISOR }}
          SII_RAZON_SOCIAL: ${{ secrets.SII_RAZON_SOCIAL }}
          ANTHROPIC_KEY: ${{ secrets.CLAUDE }}          # el secret se llama CLAUDE
          PROXY_URL: ${{ secrets.PROXY_URL }}
          PROXY_KEY: ${{ secrets.PROXY_KEY }}
          PRINTER_TUNNEL: ${{ secrets.PRINTER_TUNNEL }}
          ADS_WEBAPP: ${{ secrets.ADS_WEBAPP }}
          ADS_CUSTOMER: ${{ secrets.ADS_CUSTOMER }}
          ELEVENLABS: ${{ secrets.ELEVENLABS }}
          PRINTER_TUNNEL_TOKEN: ${{ secrets.PRINTER_TUNNEL_TOKEN }}
          LEAD_WORKER_URL: ${{ secrets.LEAD_WORKER_URL }}
          PUBLIC_LEAD_KEY: ${{ secrets.PUBLIC_LEAD_KEY }}
        run: |
          # MODO PROXY (ver SECURITY.md): con PROXY_URL+PROXY_KEY configurados, los
          # tokens de Airtable y Anthropic NO se hornean en el HTML público — quedan
          # como %%…%% (el cliente los neutraliza) y todas las llamadas van por el
          # Worker, que guarda los tokens reales como secretos server-side.
          if [ -n "${PROXY_URL}" ] && [ -n "${PROXY_KEY}" ]; then
            echo "Modo proxy: AIRTABLE_TOKEN y ANTHROPIC_KEY no se inyectan en el HTML."
          else
            sed -i "s|%%AIRTABLE_TOKEN%%|${AIRTABLE_TOKEN}|g" index.html
            sed -i "s|%%ANTHROPIC_KEY%%|${ANTHROPIC_KEY}|g" index.html
          fi
          sed -i "s|%%OPENAI_KEY%%|${OPENAI_KEY}|g" index.html
          sed -i "s|%%GOOGLE_CLIENT_ID%%|${GOOGLE_CLIENT_ID}|g" index.html
          # Portal cliente → aprobación de cotizaciones (mismos secrets del cotizador)
          if [ -n "${LEAD_WORKER_URL}" ]; then sed -i "s|%%LEAD_WORKER_URL%%|${LEAD_WORKER_URL}|g" index.html; fi
          if [ -n "${PUBLIC_LEAD_KEY}" ]; then sed -i "s|%%PUBLIC_LEAD_KEY%%|${PUBLIC_LEAD_KEY}|g" index.html; fi
          sed -i "s|%%SII_WORKER_URL%%|${SII_WORKER_URL}|g" index.html
          sed -i "s|%%SII_RUT_EMISOR%%|${SII_RUT_EMISOR}|g" index.html
          sed -i "s|%%SII_RAZON_SOCIAL%%|${SII_RAZON_SOCIAL}|g" index.html
          sed -i "s|%%PROXY_URL%%|${PROXY_URL}|g" index.html
          sed -i "s|%%PROXY_KEY%%|${PROXY_KEY}|g" index.html
          sed -i "s|%%PRINTER_TUNNEL%%|${PRINTER_TUNNEL}|g" index.html
          sed -i "s|%%ADS_WEBAPP%%|${ADS_WEBAPP}|g" index.html
          sed -i "s|%%ADS_CUSTOMER%%|${ADS_CUSTOMER}|g" index.html
          sed -i "s|%%ELEVENLABS%%|${ELEVENLABS}|g" index.html
          sed -i "s|%%PRINTER_TUNNEL_TOKEN%%|${PRINTER_TUNNEL_TOKEN}|g" index.html

      - name: Inject secrets into cotiza.html (cotizador público)
        env:
          LEAD_WORKER_URL: ${{ secrets.LEAD_WORKER_URL }}
          PUBLIC_LEAD_KEY: ${{ secrets.PUBLIC_LEAD_KEY }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: |
          # Sin secrets configurados, los %%…%% quedan y el formulario cae a mailto: — no se rompe.
          if [ -n "${LEAD_WORKER_URL}" ]; then sed -i "s|%%LEAD_WORKER_URL%%|${LEAD_WORKER_URL}|g" cotiza.html; fi
          if [ -n "${PUBLIC_LEAD_KEY}" ]; then sed -i "s|%%PUBLIC_LEAD_KEY%%|${PUBLIC_LEAD_KEY}|g" cotiza.html; fi
          if [ -n "${TURNSTILE_SITE_KEY}" ]; then sed -i "s|%%TURNSTILE_SITE_KEY%%|${TURNSTILE_SITE_KEY}|g" cotiza.html; fi

      - name: Stamp build version (cache-busting de styles.css, js/* y service worker)
        run: sed -i "s|%%BUILD%%|${GITHUB_SHA::8}|g" index.html sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
