name: Deploy Dashboard

on:
  push:
    branches: [main, claude/dashboard-access-layers-NWj0l]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          SII_WORKER_URL: ${{ secrets.SII_WORKER_URL }}
          SII_RUT_EMISOR: ${{ secrets.SII_RUT_EMISOR }}
          SII_RAZON_SOCIAL: ${{ secrets.SII_RAZON_SOCIAL }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: |
          sed -i "s|%%AIRTABLE_TOKEN%%|${AIRTABLE_TOKEN}|g" index.html
          sed -i "s|%%OPENAI_KEY%%|${OPENAI_KEY}|g" index.html
          sed -i "s|%%GOOGLE_CLIENT_ID%%|${GOOGLE_CLIENT_ID}|g" index.html
          sed -i "s|%%SII_WORKER_URL%%|${SII_WORKER_URL}|g" index.html
          sed -i "s|%%SII_RUT_EMISOR%%|${SII_RUT_EMISOR}|g" index.html
          sed -i "s|%%SII_RAZON_SOCIAL%%|${SII_RAZON_SOCIAL}|g" index.html
          sed -i "s|%%ANTHROPIC_KEY%%|${ANTHROPIC_KEY}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
