name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject credentials from secrets
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          PROXY_KEY: ${{ secrets.PROXY_KEY }}
          PRINTER_TUNNEL: ${{ secrets.PRINTER_TUNNEL }}
        run: |
          python3 - <<'EOF'
          import os, json
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          def safe(name):
              val = (os.environ.get(name) or '').strip()
              return json.dumps(val)
          secrets = ['AIRTABLE_TOKEN','OPENAI_KEY','GOOGLE_CLIENT_ID','PROXY_URL','PROXY_KEY','PRINTER_TUNNEL']
          for s in secrets:
              html = html.replace(f"'%%{s}%%'", safe(s))
              html = html.replace(f'%%{s}%%', (os.environ.get(s) or '').strip())
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print('✓ Credentials injected (sanitized)')
          EOF

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github'
