name = "airtable-proxy"
main = "src/worker.js"
compatibility_date = "2024-09-01"

# ── Variables NO secretas (opcionales) ─────────────────────────────────
# CORS: allowlist de orígenes (coma-separado). Si el Origin de la request está
# en la lista, se refleja. Si se DEJA SIN DEFINIR, se mantiene '*' (retrocompat).
# [vars]
# ALLOWED_ORIGINS = "https://dashboard.thelab.solutions,http://localhost:3000"
#
# Defensa en profundidad: restringe los paths de Airtable a estas tablas
# (coma-separado, nombres tal cual aparecen en la URL). Si se deja sin definir,
# se permite cualquier tabla (retrocompat). No afecta a /anthropic/*.
# ALLOWED_TABLES = "Clientes,Proyectos,Agent_Queue"

# Secrets — ejecutar una vez después del deploy:
#   wrangler secret put AIRTABLE_TOKEN    ← tu PAT de Airtable (patXXX...)
#   wrangler secret put ANTHROPIC_TOKEN   ← tu API key de Anthropic (sk-ant-...)
#   wrangler secret put APP_KEY           ← passphrase que elijas (mínimo 20 chars)
#
# Deploy:
#   cd airtable-proxy && npx wrangler deploy
#
# Luego en el dashboard (Mi cuenta → Proxy Worker):
#   URL:   https://airtable-proxy.<tu-subdominio>.workers.dev
#   Clave: el mismo valor que pusiste en APP_KEY
#
# Con esto, ni el PAT de Airtable ni la API key de Anthropic salen al navegador:
#   - Airtable:  <worker>/<base>/<tabla>           (el dashboard ya lo usa)
#   - Claude:    <worker>/anthropic/v1/messages    (callClaude lo usa automáticamente)
