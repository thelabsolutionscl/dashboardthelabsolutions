# thelab-leads-worker — endpoint público de captación de leads
# Despliegue:  cd lead-worker && npx wrangler deploy
# Dev local:   npx wrangler dev   (usa .dev.vars para secretos locales)

name = "thelab-leads-worker"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Observabilidad (logs/analytics del Worker)
[observability]
enabled = true

# Reintento de leads en buffer (dead-letter) cada hora
[triggers]
crons = ["17 * * * *"]

# ── Variables NO secretas ──────────────────────────────────────────────
# El Base ID de Airtable NO es secreto (aparece en URLs), por eso va aquí.
[vars]
AIRTABLE_BASE_ID = "app1YtD74AqiPWQhy"
# Orígenes permitidos para CORS (coma-separado). Sin wildcard.
ALLOWED_ORIGINS = "https://thelab.solutions,https://www.thelab.solutions,http://localhost:3000"
# "true" para que el Worker llame a Claude y deje el lead pre-scoreado.
AUTO_PROCESS_LEADS = "true"
# Auto-respuesta al lead (requiere secret RESEND_API_KEY). From debe ser dominio verificado en Resend.
RESEND_FROM = "The Lab Solutions <hola@thelab.solutions>"
WHATSAPP_NUMBER = "56928785039"
# Newsletter: doble opt-in. Con RESEND_API_KEY configurado, /newsletter envía un correo
# de confirmación y NO suscribe hasta que el usuario hace clic. Poner "false" para alta directa.
NEWSLETTER_DOUBLE_OPTIN = "true"
# Agente de voz (VAPI): horario hábil en Chile para decidir si transferir a un socio
# (tool estado_horario). Lun–Vie entre estas horas; fuera de eso el agente toma la
# bajada y agenda callback al día hábil siguiente.
BUSINESS_START = "9"
BUSINESS_END = "18"

# ── KV opcional para rate-limiting ─────────────────────────────────────
# Crear con:  npx wrangler kv namespace create LEADS_RL
# y luego descomentar y pegar el id:
[[kv_namespaces]]
binding = "RL"
id = "c148848321344f60939fa71a51d050c6"

# ── SECRETOS (NO escribir valores aquí) ────────────────────────────────
# Configurar con:  npx wrangler secret put NOMBRE
#   AIRTABLE_TOKEN          (PAT de Airtable con scope data.records:write)
#   PUBLIC_LEAD_KEY         (clave compartida con la web — anti-bot básico)
#   GOOGLE_ADS_WEBHOOK_KEY  (clave del webhook de Google Lead Form)
#   LINKEDIN_WEBHOOK_KEY    (clave del webhook de LinkedIn vía Make/Zapier)
#   VOICE_WEBHOOK_KEY       (clave del webhook del agente de voz VAPI — /webhooks/voice)
#   VOICE_HMAC_SECRET       (opcional — firma HMAC del webhook de voz; si se usa, reemplaza al secreto compartido)
#   WHATSAPP_VERIFY_TOKEN   (Fase 3 — verificación del webhook de WhatsApp de Meta)
#   WHATSAPP_APP_SECRET     (Fase 3 — valida la firma X-Hub-Signature-256 de Meta)
#   WHATSAPP_TOKEN          (Fase 3 — token de la WhatsApp Cloud API: descarga de audio + envío de mensajes)
#   WHATSAPP_PHONE_ID       (Fase 3 — phone_number_id para responder por WhatsApp)
#   OPENAI_API_KEY          (Fase 3 — STT de notas de voz con Whisper)
#   VAPI_API_KEY            (Fase 4 — API de VAPI para llamadas salientes)
#   VAPI_PHONE_NUMBER_ID    (Fase 4 — número saliente configurado en VAPI)
#   VAPI_ASSISTANT_ID       (Fase 4 — asistente para salientes; opcional VAPI_OUTBOUND_ASSISTANT_ID)
#   OUTBOUND_KEY            (Fase 4 — autoriza POST /voice/outbound; si falta usa VOICE_WEBHOOK_KEY)
#   TURNSTILE_SECRET        (opcional — verificación Cloudflare Turnstile)
#   ANTHROPIC_API_KEY       (opcional — solo si AUTO_PROCESS_LEADS=true)
#   RESEND_API_KEY          (opcional — auto-respuesta de leads + confirmación de newsletter)
#   NEWSLETTER_SECRET       (opcional — firma tokens de confirmación/baja; si falta usa PUBLIC_LEAD_KEY)
