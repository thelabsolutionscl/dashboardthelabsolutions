name = "sii-dte-worker"
main = "src/index.js"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# Cambiar a "certificacion" para pruebas con maullin.sii.cl
[vars]
SII_ENV = "certificacion"

# KV namespace para folios y CAFs (crear con: wrangler kv namespace create FOLIOS_KV)
[[kv_namespaces]]
binding = "FOLIOS_KV"
id = "12c2c38ebe2d47b39e20daafddfa6ea7"

# Secrets — configurar con: bash setup-secrets.sh  (o: wrangler secret put NOMBRE)
# Nombres requeridos (los VALORES reales NO van aquí — viven como secrets):
#   CERT_PFX_BASE64, CERT_PFX_PASSWORD, RUT_EMISOR, RAZON_SOCIAL, GIRO_EMISOR,
#   ACTECO, DIR_EMISOR, CMNA_EMISOR, CIUDAD_EMISOR, RESOLUCION_FECHA, RESOLUCION_NUMERO
