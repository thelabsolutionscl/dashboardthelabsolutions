name = "sii-dte-worker"
main = "src/index.js"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# Cambiar a "certificacion" para pruebas con maullin.sii.cl
[vars]
SII_ENV = "certificacion"

# KV namespace para folios y CAFs (crear con: wrangler kv namespace create FOLIOS_KV)
[[kv_namespaces]]
binding = "FOLIOS_KV"
id = "REEMPLAZAR_CON_TU_KV_ID"

