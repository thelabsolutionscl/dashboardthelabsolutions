<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="YOURPETS:SOLUTIONS — Diagnóstico veterinario molecular y genético">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="0.6" stop-color="#0c1413"/>
      <stop offset="1" stop-color="#0a1416"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27d8cd"/>
      <stop offset="1" stop-color="#00b3ac"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#ff6b35" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.9" r="0.7">
      <stop offset="0" stop-color="#00d4cc" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00d4cc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#00d4cc" stroke-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- logo mark -->
  <g transform="translate(90,150)">
    <rect width="120" height="120" rx="30" fill="url(#mark)"/>
    <g fill="#0a0a0a" transform="translate(60,60) scale(0.95)">
      <ellipse cx="-19" cy="-15" rx="10.5" ry="13"/>
      <ellipse cx="19" cy="-15" rx="10.5" ry="13"/>
      <ellipse cx="-36" cy="4" rx="9" ry="11"/>
      <ellipse cx="36" cy="4" rx="9" ry="11"/>
      <path d="M0 2c14 0 25 9.7 25 22 0 9-7 14-15.5 14-4.3 0-7-2-9.5-2s-5.2 2-9.5 2C-18 38-25 33-25 24-25 11.7-14 2 0 2Z"/>
    </g>
    <circle cx="60" cy="83" r="4" fill="#ff6b35"/>
  </g>
  <!-- wordmark -->
  <text x="240" y="205" font-family="'DM Sans', Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1">YOURPETS<tspan fill="#00d4cc">:</tspan><tspan fill="#8b9598" font-weight="500">SOLUTIONS</tspan></text>
  <text x="242" y="256" font-family="'DM Sans', Arial, sans-serif" font-size="26" fill="#b6c4c6">Diagnóstico veterinario molecular y genético</text>
  <!-- tagline (Bebas-style poster) -->
  <text x="90" y="402" font-family="'Bebas Neue', Arial, sans-serif" font-size="76" fill="#ffffff" letter-spacing="1">CIENCIA DE VANGUARDIA</text>
  <text x="90" y="470" font-family="'Bebas Neue', Arial, sans-serif" font-size="76" fill="#00d4cc" letter-spacing="1">AL SERVICIO DE TUS MASCOTAS</text>
  <!-- chips -->
  <g font-family="'JetBrains Mono', monospace" font-size="21" fill="#9aabad">
    <rect x="90" y="520" width="250" height="50" rx="25" fill="none" stroke="#00d4cc" stroke-opacity="0.35"/>
    <text x="114" y="552">qPCR mismo día</text>
    <rect x="360" y="520" width="290" height="50" rx="25" fill="none" stroke="#00d4cc" stroke-opacity="0.35"/>
    <text x="384" y="552">256 marcadores genéticos</text>
    <rect x="670" y="520" width="230" height="50" rx="25" fill="none" stroke="#00d4cc" stroke-opacity="0.35"/>
    <text x="694" y="552">Cobertura nacional</text>
  </g>
</svg>
